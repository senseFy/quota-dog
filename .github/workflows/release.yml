name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version, e.g. 0.1.0 (no leading v)"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      version_code: ${{ steps.v.outputs.version_code }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - name: Resolve version + version_code
        id: v
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            tag="v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          fi
          # Android versionCode = monotonically increasing int. Use the workflow run number;
          # combined with the tag-based versionName this is unique per release.
          version_code="${{ github.run_number }}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved version=${version} versionCode=${version_code} tag=${tag}"

  android:
    name: Android (APK + AAB)
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.QUOTADOG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_B64:-}" ]; then
            echo "::error::Secret QUOTADOG_KEYSTORE_BASE64 is empty or unset."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed APK + AAB
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_VERSION_CODE: ${{ needs.prepare.outputs.version_code }}
          QUOTADOG_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          QUOTADOG_KEYSTORE_PASSWORD: ${{ secrets.QUOTADOG_KEYSTORE_PASSWORD }}
          QUOTADOG_KEY_ALIAS: ${{ secrets.QUOTADOG_KEY_ALIAS }}
          QUOTADOG_KEY_PASSWORD: ${{ secrets.QUOTADOG_KEY_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease :composeApp:bundleRelease --stacktrace

      - name: Stage Android artifacts
        run: |
          mkdir -p staging
          ver="${{ needs.prepare.outputs.version }}"
          cp composeApp/build/outputs/apk/release/*.apk "staging/QuotaDog-${ver}.apk"
          cp composeApp/build/outputs/bundle/release/*.aab "staging/QuotaDog-${ver}.aab"
          ls -la staging

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: staging/*
          if-no-files-found: error

  desktop:
    name: Desktop (${{ matrix.label }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS dmg
            task: packageDmg
            glob: "*.dmg"
          - os: windows-latest
            label: Windows msi
            task: packageMsi
            glob: "*.msi"
          - os: ubuntu-latest
            label: Linux deb
            task: packageDeb
            glob: "*.deb"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build native distribution
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: ./gradlew :composeApp:${{ matrix.task }} --stacktrace

      - name: Stage desktop artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging
          # Compose Desktop output dir layout: composeApp/build/compose/binaries/main/{dmg|msi|deb}/
          src=$(find composeApp/build/compose/binaries -type f -name "${{ matrix.glob }}" | head -n 1)
          if [ -z "$src" ]; then
            echo "::error::No artifact matched ${{ matrix.glob }}"
            find composeApp/build/compose/binaries -type f | head -50
            exit 1
          fi
          ext="${src##*.}"
          ver="${{ needs.prepare.outputs.version }}"
          cp "$src" "staging/QuotaDog-${ver}.${ext}"
          ls -la staging

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: staging/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [prepare, android, desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f \( -name "*.apk" -o -name "*.aab" -o -name "*.dmg" -o -name "*.msi" -o -name "*.deb" \) -exec cp {} dist/ \;
          ls -la dist

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: QuotaDog ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
